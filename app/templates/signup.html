<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | CoorgCult AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo" style="cursor: pointer;" onclick="window.location.href='/'">CoorgCult <span>AI</span></div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p class="subtitle">Start your journey with us</p>
            </div>
            
            <form id="signup-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Choose a username" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email address" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Min 8 characters" minlength="8" maxlength="50" required>
                </div>
                
                <p id="error-message" class="error-msg"></p>
                <div id="success-message" class="success-msg"></div>

                <button type="submit" class="btn btn-primary auth-btn" id="submit-btn">
                    <span>Sign Up</span>
                </button>
            </form>
            
            <div class="auth-links">
                Already have an account? <a href="/login">Log In</a>
            </div>
        </div>
    </main>

    <script src="/static/js/auth.js"></script>
</body>
</html>
