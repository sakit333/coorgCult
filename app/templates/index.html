<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoorgCult | AI Assistant</title>

    <!-- Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">

    <script>
        // Route Protection
        if (!localStorage.getItem("access_token")) {
            window.location.href = "/login";
        }
        
        // Use the validated session ID passed from the backend router
        window.session_id = "{{ session_id }}";
        if (!window.session_id || window.session_id === "{{ session_id }}") {
            // Fallback if Jinja variable wasn't processed properly
            window.session_id = localStorage.getItem("session_id") || crypto.randomUUID();
        }

        function handleLogout() {
            localStorage.removeItem("access_token");
            localStorage.removeItem("session_id");
            window.location.href = "/login";
        }
    </script>
</head>

<body>
    <!-- Navigation Bar with Login/Signup -->
    <nav class="navbar">
        <div class="logo">CoorgCult <span>AI</span></div>
        <div class="auth-buttons">
            <button class="btn btn-login" onclick="handleLogout()">Log Out</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container chat-layout">
        <div class="hero-section">
            <h1>Hello from FastAPI 🚀</h1>
            <p class="subtitle">Experience the next generation of AI web applications.</p>
        </div>

        <div class="chat-controls" style="display: flex; justify-content: flex-end; width: 100%; margin-bottom: 5px;">
            <button class="btn btn-login btn-sm" onclick="clearChat()" id="clear-btn" style="padding: 5px 10px; font-size: 0.8rem;">
                Clear Chat
            </button>
        </div>

        <div class="output-container" style="flex-grow: 1; width: 100%; display: flex; flex-direction: column; overflow: hidden; margin-bottom: 20px;">
            <div id="chat-history-container" class="chat-history">
                <!-- Chat messages will be dynamically added here -->
            </div>
        </div>

        <div class="input-container" style="margin-top: 15px;">
            <input type="text" id="prompt" placeholder="Message the assistant..." autocomplete="off">
            <button class="btn btn-primary" onclick="sendData()" id="send-btn">
                <span>Send</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
</body>

</html>
