<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | CoorgCult AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo" style="cursor: pointer;" onclick="window.location.href='/'">CoorgCult <span>AI</span></div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p class="subtitle">Log in to continue to your assistant</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
                
                <p id="error-message" class="error-msg"></p>

                <button type="submit" class="btn btn-primary auth-btn" id="submit-btn">
                    <span>Log In</span>
                </button>
            </form>
            
            <div class="auth-links">
                Don't have an account? <a href="/signup">Sign Up</a>
            </div>
        </div>
    </main>

    <script src="/static/js/auth.js"></script>
</body>
</html>
