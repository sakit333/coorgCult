version: '3.8'

services:
  # -----------------------------------------
  # CORE APPLICATION
  # -----------------------------------------
  web:
    build: .
    image: sakit333/coorgcult-api:latest
    container_name: coorgcult_web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
      OLLAMA_URL: http://host.docker.internal:11434
      # Telemetry routing
      TEMPO_URL: http://tempo:4318/v1/traces
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    restart: always

  db:
    image: postgres:15-alpine
    container_name: coorgcult_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coorgcult}
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-coorgcult}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:alpine
    container_name: coorgcult_redis
    volumes:
      - redis_data:/data
    restart: always

  # -----------------------------------------
  # LGTM OBSERVABILITY STACK
  # -----------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: coorgcult_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:latest
    container_name: coorgcult_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=exemplar-storage
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  loki:
    image: grafana/loki:latest
    container_name: coorgcult_loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:latest
    container_name: coorgcult_promtail
    volumes:
      - ./logs:/var/log/app_logs
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:latest
    command: [ "-config.file=/etc/tempo.yaml" ]
    container_name: coorgcult_tempo
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
    ports:
      - "14268:14268"  # jaeger ingest
      - "3200:3200"    # tempo
      - "4317:4317"    # otlp grpc
      - "4318:4318"    # otlp http

volumes:
  postgres_data:
  redis_data:
