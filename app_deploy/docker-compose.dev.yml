version: "3.9"

services:
  web:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env.docker   # ✅ IMPORTANT CHANGE
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    env_file:
      - .env.docker   # ✅ reuse same env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5
    mem_limit: 768m
    cpus: 0.8
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
      ollama serve &
      sleep 5 &&
      ollama pull deepseek-coder &&
      wait
      "
    mem_limit: 4g
    cpus: 2.0
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data: